<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pedidos - Compra Líder Split</title>
<style>
  :root{
    --accent:#2563eb;
    --bg:#f8fafc;
    --border:#e2e8f0;
  }
  *{box-sizing:border-box;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    margin:0; padding:24px; background:var(--bg); color:#0f172a;
  }
  .wrap{max-width:720px;margin:0 auto;}
  .top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
  h1{font-size:22px;margin:0 0 4px;}
  .subtitle{color:#64748b;font-size:14px;margin:0;}

  .btn-primary{
    background:var(--accent);color:#fff;border:none;border-radius:8px;
    padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;
  }
  .btn-primary:hover{background:#1d4ed8;}
  .btn-primary:disabled{background:#94a3b8;cursor:not-allowed;}
  .btn-secondary{
    background:#fff;color:#334155;border:1px solid var(--border);border-radius:8px;
    padding:10px 16px;font-size:14px;cursor:pointer;
  }
  .btn-secondary:hover{background:#f1f5f9;}

  .muted{color:#94a3b8;font-size:13px;}

  .order-card{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:#fff;border:1px solid var(--border);border-radius:10px;
    padding:14px 16px;margin-bottom:10px;text-decoration:none;color:inherit;
  }
  .order-card:hover{border-color:var(--accent);}
  .order-name{font-weight:600;font-size:15px;}
  .order-meta{font-size:12.5px;color:#64748b;margin-top:2px;}
  .order-total{font-weight:700;font-size:15px;font-variant-numeric:tabular-nums;white-space:nowrap;}

  dialog{
    border:none;border-radius:12px;padding:20px;width:min(480px,90vw);
    box-shadow:0 20px 40px rgba(15,23,42,.2);
  }
  dialog::backdrop{background:rgba(15,23,42,.45);}
  dialog h2{margin:0 0 14px;font-size:17px;}
  .tabs{display:flex;gap:6px;margin-bottom:14px;border-bottom:1px solid var(--border);}
  .tab-btn{
    background:none;border:none;padding:8px 4px;margin-bottom:-1px;cursor:pointer;
    font-size:13.5px;color:#64748b;border-bottom:2px solid transparent;
  }
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
  .tab-panel label{display:block;font-size:12.5px;color:#475569;font-weight:600;margin:10px 0 4px;}
  .tab-panel input[type=text], .tab-panel input[type=date], .tab-panel input[type=file]{
    width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;
  }
  .dialog-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}

  .review-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px;}
  .review-table th{text-align:left;color:#64748b;font-size:11.5px;text-transform:uppercase;padding:4px 4px;}
  .review-table td{padding:3px 4px;}
  .review-table input[type=text]{width:100%;padding:5px 6px;border:1px solid var(--border);border-radius:5px;font-size:13px;}
  .review-table input[type=number]{width:100%;padding:5px 6px;border:1px solid var(--border);border-radius:5px;font-size:13px;}
  .review-table button{border:1px solid var(--border);background:#fff;border-radius:5px;cursor:pointer;width:26px;height:26px;}
  #photo-add-row{margin-top:6px;border:1px dashed var(--border);background:#fff;border-radius:6px;padding:6px 10px;font-size:12.5px;cursor:pointer;color:#475569;}

  @media (max-width:600px){
    body{padding:12px;}
    h1{font-size:19px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-row">
    <div>
      <h1>Pedidos</h1>
      <p class="subtitle">Compras compartidas entre Sebastián, Ignacio y Diego</p>
    </div>
    <button type="button" class="btn-primary" id="new-order-btn">+ Nuevo pedido</button>
  </div>

  <div id="orders-list"><p class="muted">Cargando pedidos…</p></div>
</div>

<dialog id="new-order-dialog">
  <h2>Nuevo pedido</h2>
  <div class="tabs">
    <button type="button" class="tab-btn active" data-tab="manual">Manual</button>
    <button type="button" class="tab-btn" data-tab="photo">Desde foto</button>
  </div>

  <div id="tab-manual" class="tab-panel">
    <label for="manual-name">Nombre</label>
    <input id="manual-name" type="text" placeholder="Ej: Compra Jumbo semana 30">
    <label for="manual-date">Fecha</label>
    <input id="manual-date" type="date">
    <div class="dialog-actions">
      <button type="button" class="btn-secondary" data-close>Cancelar</button>
      <button type="button" class="btn-primary" id="manual-create">Crear pedido</button>
    </div>
  </div>

  <div id="tab-photo" class="tab-panel" hidden>
    <label for="photo-input">Foto del pedido o boleta</label>
    <input id="photo-input" type="file" accept="image/*" capture="environment">
    <p class="muted" id="photo-status"></p>

    <div id="photo-review" hidden>
      <table class="review-table">
        <thead>
          <tr><th>Producto</th><th>Cant.</th><th>Precio unit.</th><th></th></tr>
        </thead>
        <tbody id="photo-items-body"></tbody>
      </table>
      <button type="button" id="photo-add-row">+ Agregar fila</button>
      <label for="photo-name">Nombre del pedido</label>
      <input id="photo-name" type="text" placeholder="Ej: Compra Jumbo semana 30">
      <label for="photo-date">Fecha</label>
      <input id="photo-date" type="date">
    </div>

    <div class="dialog-actions">
      <button type="button" class="btn-secondary" data-close>Cancelar</button>
      <button type="button" class="btn-primary" id="photo-create" disabled>Guardar pedido</button>
    </div>
  </div>
</dialog>

<script>
const API_ORDERS = "/api/orders";
const API_PARSE = "/api/parse-receipt";
const MAX_DIM = 1600;

function fmt(n){
  return "$" + Math.round(n).toLocaleString("es-CL");
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function todayLocalISODate(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

async function loadOrders(){
  const list = document.getElementById("orders-list");
  try{
    const res = await fetch(API_ORDERS, {cache:"no-store"});
    if(!res.ok) throw new Error("HTTP " + res.status);
    const orders = await res.json();
    renderOrders(Array.isArray(orders) ? orders : []);
  }catch(e){
    list.innerHTML = '<p class="muted">No se pudieron cargar los pedidos. Revisá la conexión y recargá.</p>';
  }
}

function renderOrders(orders){
  const list = document.getElementById("orders-list");
  if(!orders.length){
    list.innerHTML = '<p class="muted">Todavía no hay pedidos. Creá el primero con el botón de arriba.</p>';
    return;
  }
  const sorted = [...orders].sort((a,b)=>
    (b.date || "").localeCompare(a.date || "") || (b.createdAt || "").localeCompare(a.createdAt || "")
  );
  list.innerHTML = sorted.map(o => `
    <a class="order-card" href="pedido.html?id=${encodeURIComponent(o.id)}">
      <div>
        <div class="order-name">${escapeHtml(o.name)}</div>
        <div class="order-meta">${escapeHtml(o.date || "")} · ${o.itemCount || 0} producto${o.itemCount === 1 ? "" : "s"}</div>
      </div>
      <div class="order-total">${fmt(o.total || 0)}</div>
    </a>
  `).join("");
}

async function createOrder(name, date, items){
  const payload = {
    name, date,
    items: items.map(it => ({
      id: it.id,
      name: it.name,
      qty: Number(it.qty),
      unitPrice: Number(it.unitPrice),
    })),
  };
  const res = await fetch(API_ORDERS, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload),
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok){
    alert(data.error || "No se pudo crear el pedido.");
    return;
  }
  window.location.href = "pedido.html?id=" + encodeURIComponent(data.id);
}

// --- dialog / tabs ---

const dialog = document.getElementById("new-order-dialog");

document.getElementById("new-order-btn").addEventListener("click", () => {
  const today = todayLocalISODate();
  document.getElementById("manual-date").value = today;
  document.getElementById("photo-date").value = today;
  dialog.showModal();
});

document.querySelectorAll("[data-close]").forEach(btn => {
  btn.addEventListener("click", () => dialog.close());
});

dialog.addEventListener("close", () => {
  document.getElementById("manual-name").value = "";
  document.getElementById("manual-date").value = "";
  document.getElementById("photo-input").value = "";
  document.getElementById("photo-name").value = "";
  document.getElementById("photo-date").value = "";
  document.getElementById("photo-status").textContent = "";
  document.getElementById("photo-review").hidden = true;
  document.getElementById("photo-create").disabled = true;
  photoItems = [];
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelector('.tab-btn[data-tab="manual"]').classList.add("active");
  document.getElementById("tab-manual").hidden = false;
  document.getElementById("tab-photo").hidden = true;
});

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const tab = btn.dataset.tab;
    document.getElementById("tab-manual").hidden = tab !== "manual";
    document.getElementById("tab-photo").hidden = tab !== "photo";
  });
});

// --- manual creation ---

document.getElementById("manual-create").addEventListener("click", async () => {
  const name = document.getElementById("manual-name").value.trim();
  const date = document.getElementById("manual-date").value;
  if(!name || !date){
    alert("Completá nombre y fecha.");
    return;
  }
  await createOrder(name, date, []);
});

// --- photo creation ---

let photoItems = [];

function blobToBase64(blob){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(String(reader.result).split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

async function downscaleImage(file){
  const bitmap = await createImageBitmap(file);
  let width = bitmap.width, height = bitmap.height;
  if(width > MAX_DIM || height > MAX_DIM){
    const scale = MAX_DIM / Math.max(width, height);
    width = Math.round(width * scale);
    height = Math.round(height * scale);
  }
  const canvas = document.createElement("canvas");
  canvas.width = width;
  canvas.height = height;
  canvas.getContext("2d").drawImage(bitmap, 0, 0, width, height);
  const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", 0.8));
  const base64 = await blobToBase64(blob);
  return { base64, mediaType: "image/jpeg" };
}

function renderPhotoItems(){
  const tbody = document.getElementById("photo-items-body");
  tbody.innerHTML = photoItems.map((it, idx) => `
    <tr>
      <td><input type="text" value="${escapeHtml(it.name)}" data-field="name" data-idx="${idx}"></td>
      <td><input type="number" min="1" step="1" value="${it.qty}" data-field="qty" data-idx="${idx}"></td>
      <td><input type="number" min="0" step="1" value="${it.unitPrice}" data-field="unitPrice" data-idx="${idx}"></td>
      <td><button type="button" data-remove="${idx}" title="Borrar fila">✕</button></td>
    </tr>
  `).join("");

  tbody.querySelectorAll("input").forEach(inp => {
    inp.addEventListener("change", () => {
      const idx = Number(inp.dataset.idx);
      const field = inp.dataset.field;
      photoItems[idx][field] = field === "name" ? inp.value : Number(inp.value);
    });
  });
  tbody.querySelectorAll("[data-remove]").forEach(btn => {
    btn.addEventListener("click", () => {
      photoItems.splice(Number(btn.dataset.remove), 1);
      renderPhotoItems();
    });
  });
}

document.getElementById("photo-add-row").addEventListener("click", () => {
  photoItems.push({id: crypto.randomUUID(), name: "", qty: 1, unitPrice: 0});
  renderPhotoItems();
});

document.getElementById("photo-input").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const statusEl = document.getElementById("photo-status");
  document.getElementById("photo-review").hidden = true;
  document.getElementById("photo-create").disabled = true;
  statusEl.textContent = "Procesando imagen…";
  try{
    const {base64, mediaType} = await downscaleImage(file);
    statusEl.textContent = "Analizando con IA…";
    const res = await fetch(API_PARSE, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({image: base64, mediaType}),
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok){
      statusEl.textContent = data.error || "No se pudo leer la imagen.";
      return;
    }
    photoItems = (data.items || []).map(it => ({
      id: crypto.randomUUID(), name: it.name, qty: it.qty, unitPrice: it.unitPrice,
    }));
    statusEl.textContent = photoItems.length
      ? `${photoItems.length} producto(s) detectado(s). Revisá antes de guardar.`
      : "No se detectaron productos. Podés agregarlos a mano.";
    renderPhotoItems();
    document.getElementById("photo-review").hidden = false;
    document.getElementById("photo-create").disabled = false;
  }catch(err){
    statusEl.textContent = "Error al procesar la imagen.";
  }
});

document.getElementById("photo-create").addEventListener("click", async () => {
  const name = document.getElementById("photo-name").value.trim() || "Pedido sin nombre";
  const date = document.getElementById("photo-date").value || todayLocalISODate();
  if(!photoItems.length){
    alert("Agregá al menos un producto antes de guardar.");
    return;
  }
  await createOrder(name, date, photoItems);
});

loadOrders();
</script>
</body>
</html>
